name: Go Build

on:
  workflow_call:
    inputs:
      path:
        description: 'Working directory (path to module root)'
        required: false
        default: '.'
        type: string
      go_version:
        description: 'Go version to use'
        required: false
        default: 'stable'
        type: string
      output:
        description: 'Output binary path passed to -o (omit to skip -o)'
        required: false
        default: ''
        type: string
      ldflags:
        description: 'Linker flags passed to -ldflags'
        required: false
        default: ''
        type: string
      runner:
        description: 'Runner label'
        required: false
        default: 'self-hosted'
        type: string

jobs:
  go-build:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.path }}/go.sum

      - name: Build
        env:
          OUTPUT: ${{ inputs.output }}
          LDFLAGS: ${{ inputs.ldflags }}
        run: |
          ARGS=()
          [ -n "${OUTPUT}" ] && ARGS+=(-o "${OUTPUT}")
          [ -n "${LDFLAGS}" ] && ARGS+=(-ldflags "${LDFLAGS}")
          go build "${ARGS[@]}" ./...
