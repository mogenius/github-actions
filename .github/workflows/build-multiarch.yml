name: Build Multi-Arch Container

on:
  workflow_call:
    inputs:
      version:
        description: 'Image version tag (e.g. from prepare outputs)'
        required: true
        type: string
      image:
        description: 'Full image path without tag (e.g. ghcr.io/myorg/myimage)'
        required: true
        type: string
      registry:
        description: 'Container registry hostname for docker login'
        required: false
        default: 'ghcr.io'
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        default: './Dockerfile'
        type: string
      context:
        description: 'Docker build context path'
        required: false
        default: '.'
        type: string
      architectures:
        description: 'Comma-separated architectures to build: amd64, arm64, armv7'
        required: false
        default: 'amd64,arm64,armv7'
        type: string
      build_args:
        description: 'Additional Docker build arguments (multiline key=value). COMMIT_HASH, GIT_BRANCH, BUILD_TIMESTAMP, VERSION are always injected.'
        required: false
        default: ''
        type: string
      build_args_amd64:
        description: 'Extra build arguments injected only into the amd64 build job.'
        required: false
        default: ''
        type: string
      build_args_arm64:
        description: 'Extra build arguments injected only into the arm64 build job.'
        required: false
        default: ''
        type: string
      build_args_armv7:
        description: 'Extra build arguments injected only into the armv7 build job.'
        required: false
        default: ''
        type: string
      build_secrets:
        description: 'Docker build secrets (multiline id=value). Passed to all arch builds.'
        required: false
        default: ''
        type: string
      build_secret_envs:
        description: 'Env var names to mount as docker build secrets (multiline id=envname, e.g. GITHUB_NPM_TOKEN=GITHUB_TOKEN).'
        required: false
        default: ''
        type: string
      push_latest:
        description: 'Push a :latest tag when building from the main branch'
        required: false
        default: true
        type: boolean
      sbom:
        description: 'Generate and attach an SBOM attestation to each arch image'
        required: false
        default: true
        type: boolean
      provenance:
        description: 'Provenance attestation mode passed to docker/build-push-action (e.g. mode=min, mode=max, false). Empty string uses the action default (mode=min).'
        required: false
        default: 'mode=max'
        type: string
      sign_image:
        description: 'Sign the final manifest image keyless using cosign (requires id-token: write permission in the caller workflow)'
        required: false
        default: true
        type: boolean
      runner_amd64:
        description: 'Runner label for amd64 native builds'
        required: false
        default: 'arc-runner-set-amd64'
        type: string
      runner_arm64:
        description: 'Runner label for arm64 native builds'
        required: false
        default: 'arc-runner-set-arm64'
        type: string
      runner_armv7:
        description: 'Runner label for armv7 builds'
        required: false
        default: 'self-hosted'
        type: string
    outputs:
      digest_amd64:
        description: 'Image digest for amd64'
        value: ${{ jobs.build-amd64.outputs.digest }}
      digest_arm64:
        description: 'Image digest for arm64'
        value: ${{ jobs.build-arm64.outputs.digest }}
      digest_armv7:
        description: 'Image digest for armv7'
        value: ${{ jobs.build-armv7.outputs.digest }}

jobs:
  # ============================================================================
  # Per-architecture builds (run natively on matching runners; armv7 cross-compiles from amd64)
  # ============================================================================
  build-amd64:
    if: contains(inputs.architectures, 'amd64')
    runs-on: ${{ inputs.runner_amd64 }}
    permissions:
      contents: read
      packages: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get build metadata
        id: meta
        run: |
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "git_branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "build_timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ inputs.image }}:${{ inputs.version }}-amd64
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.build_timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.ref.name=${{ steps.meta.outputs.git_branch }}
          build-args: |
            COMMIT_HASH=${{ steps.meta.outputs.commit_hash }}
            GIT_BRANCH=${{ steps.meta.outputs.git_branch }}
            BUILD_TIMESTAMP=${{ steps.meta.outputs.build_timestamp }}
            VERSION=${{ inputs.version }}
            ${{ inputs.build_args }}
            ${{ inputs.build_args_amd64 }}
          secrets: ${{ inputs.build_secrets }}
          secret-envs: ${{ inputs.build_secret_envs }}
          sbom: ${{ inputs.sbom }}
          provenance: ${{ inputs.provenance }}

  build-arm64:
    if: contains(inputs.architectures, 'arm64')
    runs-on: ${{ inputs.runner_arm64 }}
    permissions:
      contents: read
      packages: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get build metadata
        id: meta
        run: |
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "git_branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "build_timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ inputs.image }}:${{ inputs.version }}-arm64
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.build_timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.ref.name=${{ steps.meta.outputs.git_branch }}
          build-args: |
            COMMIT_HASH=${{ steps.meta.outputs.commit_hash }}
            GIT_BRANCH=${{ steps.meta.outputs.git_branch }}
            BUILD_TIMESTAMP=${{ steps.meta.outputs.build_timestamp }}
            VERSION=${{ inputs.version }}
            ${{ inputs.build_args }}
            ${{ inputs.build_args_arm64 }}
          secrets: ${{ inputs.build_secrets }}
          secret-envs: ${{ inputs.build_secret_envs }}
          sbom: ${{ inputs.sbom }}
          provenance: ${{ inputs.provenance }}

  build-armv7:
    if: contains(inputs.architectures, 'armv7')
    runs-on: ${{ inputs.runner_armv7 }}
    permissions:
      contents: read
      packages: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get build metadata
        id: meta
        run: |
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "git_branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "build_timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        timeout-minutes: 5
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/arm/v7
          push: true
          tags: ${{ inputs.image }}:${{ inputs.version }}-armv7
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.build_timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.ref.name=${{ steps.meta.outputs.git_branch }}
          build-args: |
            COMMIT_HASH=${{ steps.meta.outputs.commit_hash }}
            GIT_BRANCH=${{ steps.meta.outputs.git_branch }}
            BUILD_TIMESTAMP=${{ steps.meta.outputs.build_timestamp }}
            VERSION=${{ inputs.version }}
            ${{ inputs.build_args }}
            ${{ inputs.build_args_armv7 }}
          secrets: ${{ inputs.build_secrets }}
          secret-envs: ${{ inputs.build_secret_envs }}
          sbom: ${{ inputs.sbom }}
          provenance: ${{ inputs.provenance }}

  # ============================================================================
  # Create multi-arch manifest combining all successfully built arch images
  # ============================================================================
  manifest:
    needs: [build-amd64, build-arm64, build-armv7]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ${{ inputs.runner_amd64 }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        env:
          IMAGE: ${{ inputs.image }}
          VERSION: ${{ inputs.version }}
          RESULT_AMD64: ${{ needs.build-amd64.result }}
          RESULT_ARM64: ${{ needs.build-arm64.result }}
          RESULT_ARMV7: ${{ needs.build-armv7.result }}
        run: |
          IMAGES=""
          [ "${RESULT_AMD64}" == "success" ] && IMAGES="${IMAGES} ${IMAGE}:${VERSION}-amd64"
          [ "${RESULT_ARM64}" == "success" ] && IMAGES="${IMAGES} ${IMAGE}:${VERSION}-arm64"
          [ "${RESULT_ARMV7}" == "success" ] && IMAGES="${IMAGES} ${IMAGE}:${VERSION}-armv7"
          IMAGES="${IMAGES# }"

          docker buildx imagetools create -t "${IMAGE}:${VERSION}" ${IMAGES}

          if [ "${{ inputs.push_latest }}" == "true" ]; then
            docker buildx imagetools create -t "${IMAGE}:latest" ${IMAGES}
          fi

      - name: Install cosign
        if: inputs.sign_image
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Sign image
        if: inputs.sign_image
        env:
          IMAGE: ${{ inputs.image }}
          VERSION: ${{ inputs.version }}
        run: |
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" | grep -m1 "^Digest:" | awk '{print $2}')
          cosign sign --yes --recursive "${IMAGE}@${DIGEST}"
          if [ "${{ inputs.push_latest }}" == "true" ]; then
            DIGEST_LATEST=$(docker buildx imagetools inspect "${IMAGE}:latest" | grep -m1 "^Digest:" | awk '{print $2}')
            cosign sign --yes --recursive "${IMAGE}@${DIGEST_LATEST}"
          fi
