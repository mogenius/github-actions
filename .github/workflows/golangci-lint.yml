name: golangci-lint

on:
  workflow_call:
    inputs:
      path:
        description: 'Working directory (path to module root)'
        required: false
        default: '.'
        type: string
      go_version:
        description: 'Go version to use'
        required: false
        default: 'stable'
        type: string
      golangci_lint_version:
        description: 'golangci-lint version'
        required: false
        default: 'v1.64.8' # renovate: datasource=github-releases depName=golangci/golangci-lint
        type: string
      args:
        description: 'Extra arguments passed to golangci-lint run'
        required: false
        default: ''
        type: string
      runner:
        description: 'Runner label'
        required: false
        default: 'self-hosted'
        type: string

jobs:
  golangci-lint:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.path }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: ${{ inputs.golangci_lint_version }}
          working-directory: ${{ inputs.path }}
          args: ${{ inputs.args }}
