name: golangci-lint

on:
  workflow_call:
    inputs:
      path:
        description: 'Working directory (path to module root)'
        required: false
        default: '.'
        type: string
      go_version:
        description: 'Go version to use'
        required: false
        default: 'stable'
        type: string
      golangci_lint_version:
        description: 'golangci-lint version'
        required: false
        default: 'v2.12.2' # renovate: datasource=github-releases depName=golangci/golangci-lint
        type: string
      args:
        description: 'Extra arguments passed to golangci-lint run'
        required: false
        default: ''
        type: string
      runner:
        description: 'Runner label'
        required: false
        default: 'self-hosted'
        type: string

jobs:
  golangci-lint:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.path }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: ${{ inputs.golangci_lint_version }}
          working-directory: ${{ inputs.path }}
          args: ${{ inputs.args }}
